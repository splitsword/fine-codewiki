name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
          - os: ubuntu-latest
            goos: linux
            arch: arm64
          - os: macos-latest
            goos: darwin
            arch: amd64
          - os: macos-latest
            goos: darwin
            arch: arm64
          - os: windows-latest
            goos: windows
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build and Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          GOOS=${{ matrix.goos }}
          GOARCH=${{ matrix.arch }}
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          bin="codewiki-${VERSION}-${GOOS}-${GOARCH}${ext}"
          echo "Building ${bin}..."
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "$bin" ./cmd/codewiki

          mkdir -p dist
          if [ "$GOOS" = "windows" ]; then
            cp "$bin" codewiki.exe
            zip "dist/${bin%.exe}.zip" codewiki.exe
          else
            cp "$bin" codewiki
            tar czf "dist/${bin}.tar.gz" codewiki
          fi
          ls -la dist/

      - uses: actions/upload-artifact@v3
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find . -name '*.tar.gz' -o -name '*.zip' | while read f; do
            cp "$f" dist/
          done
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
