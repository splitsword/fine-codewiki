name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              if [ "$os" = "windows" ] && [ "$arch" = "arm64" ]; then
                continue
              fi
              ext=""
              if [ "$os" = "windows" ]; then
                ext=".exe"
              fi
              output="dist/codewiki-${VERSION}-${os}-${arch}${ext}"
              echo "Building ${output}..."
              GOOS=$os GOARCH=$arch go build -ldflags "-s -w -X main.version=${VERSION}" -o "$output" ./cmd/codewiki
            done
          done

      - name: Package release assets
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd dist
          for f in codewiki-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.{tar.gz,zip}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
