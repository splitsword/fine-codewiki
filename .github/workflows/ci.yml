name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go mod verify
        run: go mod verify

      - name: Build
        run: go build -v ./cmd/codewiki

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race ./...

      - name: Coverage check
        shell: bash
        run: |
          echo "=== Running coverage check ==="
          go test -cover ./internal/... > /tmp/cover_raw.txt 2>&1 || true
          cat /tmp/cover_raw.txt

          # Parse baseline from coverage-baseline.md (keys like `internal/analyzer`)
          declare -A baseline
          while IFS='|' read -r _ pkg pct _; do
            pkg=$(echo "$pkg" | xargs | tr -d '\`')
            pct=$(echo "$pct" | xargs | sed 's/%//')
            if [[ "$pkg" == internal/* ]] && [[ "$pct" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              baseline["$pkg"]="$pct"
            fi
          done < <(grep -E '^\| \`internal/' coverage-baseline.md)

          echo ""
          echo "=== Coverage comparison ==="
          fail=0
          while IFS= read -r line; do
            if [[ "$line" =~ coverage:\ ([0-9]+\.[0-9]+)% ]]; then
              current="${BASH_REMATCH[1]}"
              # Extract `internal/xxx` from full module path
              full_pkg=$(echo "$line" | awk '{print $2}')
              pkg="${full_pkg##*github.com/splitsword/fine-codewiki/}"
              base="${baseline[$pkg]}"
              if [[ -n "$base" ]]; then
                diff=$(awk "BEGIN {printf \"%.1f\", $current - $base}")
                status="✅"
                if awk "BEGIN {exit !($diff < -2.0)}"; then
                  status="❌"
                  fail=1
                fi
                # Core packages must stay >= 90%
                if [[ "$pkg" =~ analyzer|chunker|grapher|embedder ]] && awk "BEGIN {exit !($current < 90.0)}"; then
                  status="❌"
                  fail=1
                  echo "$status $pkg: $current% (baseline $base%, diff ${diff}%) — BELOW 90% CORE THRESHOLD"
                  continue
                fi
                echo "$status $pkg: $current% (baseline $base%, diff ${diff}%)"
              else
                echo "⚠️  $pkg: $current% (no baseline found)"
              fi
            fi
          done < /tmp/cover_raw.txt

          if [[ "$fail" -eq 1 ]]; then
            echo ""
            echo "❌ Coverage check FAILED — some packages dropped beyond -2% tolerance or below core threshold"
            exit 1
          fi
          echo ""
          echo "✅ Coverage check PASSED"

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

      - name: Performance gate
        shell: bash
        run: |
          echo "=== Running performance benchmark (100K lines) ==="
          output=$(go test -bench=BenchmarkEndToEnd100K -benchtime=1x -run='^$' ./benchmark)
          echo "$output"

          ns=$(echo "$output" | grep 'BenchmarkEndToEnd100K' | awk '{print $3}')
          if [ -z "$ns" ]; then
            echo "❌ Failed to extract benchmark timing"
            exit 1
          fi

          seconds=$(awk "BEGIN {printf \"%.2f\", $ns / 1000000000}")
          threshold=180  # 3 minutes per PRD success criteria

          echo ""
          echo "100K line generation time: ${seconds}s (threshold: ${threshold}s)"

          if awk "BEGIN {exit !($seconds > $threshold)}"; then
            echo "❌ Performance gate FAILED — ${seconds}s exceeds ${threshold}s threshold"
            exit 1
          fi
          echo "✅ Performance gate PASSED"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: codewiki-${{ matrix.os }}-${{ matrix.go }}
          path: codewiki${{ matrix.os == 'windows-latest' && '.exe' || '' }}
